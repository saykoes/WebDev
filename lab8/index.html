<html>

<body>
    <h1>Lab 8</h1>

    <p>

        <h2>1. Timers</h2>

        <input type="number" id="counterInput" placeholder="type N" value="10">

        <button onclick="pauseCounter()">pause()</button>
        <button onclick="stopCounter()">stop()</button>

    <p>

        <input type="number" id="delayInput" placeholder="Delay" value="3">

        <input type="text" id="githubUserInput" placeholder="GitHub Username" value="SaykoES">
        <button onclick="getFirstRepo()">Get First Github Repo (then)</button>
    </p>
    <p>
        <h2>3. GitHub API (async/await)</h2>
        
        <button onclick="getGithubUserFirstRepo()">Get first Github repo (async)</button>
    </p>
    <p class="res-sec"> >
        <span id="result"></span>
    </p>
